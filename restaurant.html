<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftBite · Restaurant</title>

  <link rel="stylesheet" href="css/restaurant.css">
  <link rel="stylesheet" href="css/screens.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <div class="sb-top-bar">
    <span class="sb-top-brand">SwiftBite</span>
    <button type="button" class="sb-header-cart" id="header-cart-btn">🛒 <span id="cart-badge">0</span></button>
  </div>

  <div class="banner taco-banner" id="sb-rest-banner">
    <h2 id="sb-rest-banner-title">LET'S TACO<br>BOUT IT!!</h2>
  </div>

  <div class="content">

    <div class="title-row">
      <h2 id="sb-rest-name">Taco Cubano</h2>
      <div class="heart" onclick="toggleHeart(this)">❤</div>
    </div>

    <p class="subtitle" id="sb-rest-subtitle">Loading menu…</p>

    <div class="info" id="sb-rest-info"></div>

    <h3 class="section-title">Popular items 🔥</h3>

    <div id="sb-menu-root"></div>

  </div>

</div>

<script src="js/analytics.js"></script>
<script src="js/menu-data.js"></script>
<script src="js/cart-store.js"></script>
<script src="js/swiftbite-auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
