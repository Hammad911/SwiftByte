<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftBite · Search</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/experience.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container sb-stack">
  <div class="sb-top-bar">
    <span class="sb-top-brand">SwiftBite</span>
    <button type="button" class="sb-header-cart" id="header-cart-btn">🛒 <span id="cart-badge">0</span></button>
  </div>
  <h1 class="sb-screen-title">Restaurants</h1>
  <p class="sb-screen-sub">Search by name or cuisine vibe.</p>

  <div class="sb-filter-panel" id="search-filters">
    <div class="sb-filter-title">Filters (demo — same device data)</div>
    <div class="sb-filter-row">
      <label>Min rating
        <select id="sf-min-rating" aria-label="Minimum rating">
          <option value="0">Any</option>
          <option value="8">8+</option>
          <option value="8.5">8.5+</option>
          <option value="9">9+</option>
        </select>
      </label>
      <label>Max ETA
        <select id="sf-max-eta" aria-label="Maximum delivery minutes">
          <option value="999">Any</option>
          <option value="50">≤ 50 min</option>
          <option value="40">≤ 40 min</option>
          <option value="32">≤ 32 min</option>
        </select>
      </label>
    </div>
    <div class="sb-filter-row">
      <label><input type="checkbox" id="sf-vegan"> Vegan-friendly</label>
      <button type="button" id="sf-apply" class="promo-inline" style="padding:6px 12px;border-radius:12px;border:none;background:#ff4d2e;color:#fff;font-weight:600;font-size:11px;cursor:pointer;margin-left:auto;">Apply filters</button>
    </div>
  </div>

  <label class="sb-visually-hidden" for="search-input">Search restaurants</label>
  <input type="search" id="search-input" class="sb-input" placeholder="Try tacos, bowls…" autocomplete="off">

  <div id="search-results" class="search-results" role="list"></div>

  <div class="nav sb-nav-fixed">
    <div class="nav-item">🏠<span>Discover</span></div>
    <div class="nav-item active">🍔<span>Restaurants</span></div>
    <div class="nav-item">🔍<span>Search</span></div>
    <div class="nav-item">❤<span>Favorite</span></div>
    <div class="nav-item">👤<span>Profile</span></div>
  </div>
</div>

<script src="js/analytics.js"></script>
<script src="js/menu-data.js"></script>
<script src="js/cart-store.js"></script>
<script src="js/swiftbite-auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
