<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftBite · Sign up</title>

  <link rel="stylesheet" href="css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="signup-page">

<div class="container">

  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span>Swift<span class="accent">Bite</span></span>
  </div>

  <h2 class="title">Create account</h2>

  <fieldset class="sb-role-fieldset">
    <legend class="sb-role-legend">Sign up as</legend>
    <div class="sb-role-row" role="presentation">
      <label class="sb-role-chip">
        <input type="radio" name="sb-login-role" value="customer" checked>
        <span>Customer</span>
      </label>
      <label class="sb-role-chip">
        <input type="radio" name="sb-login-role" value="rider">
        <span>Rider</span>
      </label>
      <label class="sb-role-chip" title="Restaurant manager">
        <input type="radio" name="sb-login-role" value="restaurant_manager">
        <span>Restaurant</span>
      </label>
    </div>
  </fieldset>

  <label for="signup-email">Email</label>
  <input id="signup-email" type="email" autocomplete="email" placeholder="you@example.com">

  <label for="signup-password">Password</label>
  <div class="password-row">
    <input id="signup-password" type="password" autocomplete="new-password" placeholder="At least 6 characters">
    <span class="eye" role="button" tabindex="0" aria-label="Show password">👁</span>
  </div>

  <button type="button" class="btn primary-login" id="signup-submit">Sign up</button>

  <div class="signup">
    Already have an account? <span id="go-login">Login</span>
  </div>

</div>

<script src="js/analytics.js"></script>
<script src="js/swiftbite-auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
